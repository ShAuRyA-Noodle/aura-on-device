name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — agents + orchestrator
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'agents/') ||
      contains(github.event.head_commit.modified, 'orchestrator/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
        continue-on-error: true

      - name: Run pytest
        run: |
          if [ -d tests ] || [ -d agents ] || [ -d orchestrator ]; then
            pytest -q || echo "pytest exited non-zero (best-effort)"
          else
            echo "No tests yet, skipping."
          fi
        continue-on-error: true

  swift:
    name: Swift — iOS app format check
    runs-on: macos-14
    if: |
      contains(github.event.head_commit.modified, 'apps/ios/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install swift-format
        run: |
          brew install swift-format || echo "swift-format unavailable"
        continue-on-error: true

      - name: Run swift-format lint
        run: |
          if command -v swift-format >/dev/null 2>&1; then
            swift-format lint --recursive apps/ios/Aura/Sources || echo "swift-format reported issues (best-effort)"
          else
            echo "swift-format not installed, skipping."
          fi
        continue-on-error: true
