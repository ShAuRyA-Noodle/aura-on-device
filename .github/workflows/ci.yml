name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep the queue cheap.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: agents/core/requirements-ci.txt

      - name: Install slim test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/core/requirements-ci.txt

      - name: pytest agents + orchestrator + memory
        run: pytest agents/ orchestrator/ memory/ -v --tb=short

  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agents/core/requirements-ci.txt

      - name: Install slim test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/core/requirements-ci.txt

      - name: pytest e2e
        run: pytest e2e/ -v --tb=short

  deck-validation:
    name: Deck validation — slides + speaker notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run deck validator
        run: python scripts/validate_deck.py

  lint:
    # Lint runs in informational (non-blocking) mode. Style issues do not
    # gate the hackathon submission. Formatters are expected to flag
    # generated synthetic-data files; we keep them visible without
    # blocking pushes.
    name: Lint — black, ruff (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install black==24.8.0 ruff==0.6.5

      - name: black --check
        continue-on-error: true
        run: black --check agents orchestrator memory e2e benchmarks scripts || true

      - name: ruff check
        continue-on-error: true
        run: ruff check agents orchestrator memory e2e benchmarks scripts || true
