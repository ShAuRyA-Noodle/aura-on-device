# CommsAgent LoRA — Hugging Face PEFT config.
# Spec source: technical_spec.md section 9.1.
# Hardware target: Alienware M16 R1, RTX 4080 Laptop GPU, 12 GB VRAM.
# QLoRA on a 4-bit base gives margin for per_device_train_batch_size=4.

base_model: google/gemma-2b-it
output_dir: models/exports/gemma-2b-aura-comms-adapter
run_name: gemma-2b-aura-comms

dataset:
  train_path: datasets/comms/comms_train.jsonl
  eval_path: datasets/comms/comms_eval.jsonl
  text_field: text
  prompt_template: chatml

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4   # effective batch 16
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 0.3
  optim: paged_adamw_8bit
  bf16: true
  fp16: false
  tf32: true
  max_seq_length: 1024
  packing: false
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  report_to:
    - tensorboard

early_stopping:
  enabled: true
  patience: 3
  threshold: 0.005

seed: 42
