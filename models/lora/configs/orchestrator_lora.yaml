# Orchestrator LoRA — Phase 2 contingent.
# Only train this if off-the-shelf Phi-3-mini hallucinates tool calls in eval
# (see models/eval/eval_orchestrator.py).
# Spec source: technical_spec.md section 9.3.

base_model: microsoft/Phi-3-mini-4k-instruct
output_dir: models/exports/phi3-mini-aura-orchestrator-adapter
run_name: phi3-mini-aura-orchestrator

dataset:
  train_path: datasets/orchestrator/orch_train.jsonl
  eval_path: datasets/orchestrator/orch_eval.jsonl
  text_field: text
  prompt_template: phi3

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - qkv_proj
    - o_proj
    - gate_up_proj
    - down_proj

training:
  num_train_epochs: 2
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8   # effective batch 16
  gradient_checkpointing: true
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.0
  max_grad_norm: 0.3
  optim: paged_adamw_8bit
  bf16: true
  fp16: false
  tf32: true
  max_seq_length: 2048
  packing: false
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  report_to:
    - tensorboard

early_stopping:
  enabled: true
  patience: 3
  threshold: 0.005

seed: 42

phase2_contingency:
  trigger_metric: tool_call_hallucination_rate
  trigger_threshold: 0.05   # if base Phi-3-mini hallucinates >5% of tool calls in eval
  notes: |
    Run only after eval_orchestrator.py reports a hallucination rate above
    the threshold on the orchestrator/replays/ fixture. Until that bar is
    crossed we ship Phi-3-mini off-the-shelf with a deterministic system
    prompt and JSON-schema-validated tool calls.
